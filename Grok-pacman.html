<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man Style Game</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; }
        #game-container { border: 4px solid #00f; box-shadow: 0 0 20px #00f; }
        .score { position: absolute; top: 20px; left: 20px; color: white; font-size: 24px; z-index: 10; }
    </style>
</head>
<body>
    <div class="score">SCORE: <span id="score">0</span></div>
    <div id="game-container"></div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 28 * 20,
            height: 31 * 20,
            parent: 'game-container',
            backgroundColor: '#000000',
            physics: {
                default: 'arcade',
                arcade: { debug: false }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        let pacman, cursors, score = 0, scoreText;
        let dots = [];
        let walls = [];
        let ghosts = [];
        let gameOver = false;

        const TILE_SIZE = 20;
        const MAP = [
            "1111111111111111111111111111",
            "1............11............1",
            "1.1111.11111.11.11111.1111.1",
            "1.1111.11111.11.11111.1111.1",
            "1.1111.11111.11.11111.1111.1",
            "1..........................1",
            "1.1111.11.11111111.11.1111.1",
            "1.1111.11.11111111.11.1111.1",
            "1......11....11....11......1",
            "111111.11111 11 11111.111111",
            "     1.11         11.1     ",
            "     1.11 11111111 11.1     ",
            "     1.11 1      1 11.1     ",
            "111111.11 1      1 11.111111",
            "         1      1         ",
            "111111.11 1      1 11.111111",
            "     1.11 11111111 11.1     ",
            "     1.11         11.1     ",
            "     1.11 11111111 11.1     ",
            "111111.11 11111111 11.111111",
            "1............11............1",
            "1.1111.11111.11.11111.1111.1",
            "1.1111.11111.11.11111.1111.1",
            "1...11................11...1",
            "111.11.11.11111111.11.11.111",
            "111.11.11.11111111.11.11.111",
            "1......11....11....11......1",
            "1.1111111111.11.1111111111.1",
            "1.1111111111.11.1111111111.1",
            "1..........................1",
            "1111111111111111111111111111"
        ];

        function preload() {
            // Create simple graphics
            const graphics = this.add.graphics();
            
            // Wall texture
            graphics.fillStyle(0x0000ff, 1);
            graphics.fillRect(0, 0, TILE_SIZE, TILE_SIZE);
            graphics.generateTexture('wall', TILE_SIZE, TILE_SIZE);
            
            // Dot
            graphics.fillStyle(0xffff00, 1);
            graphics.fillCircle(TILE_SIZE/2, TILE_SIZE/2, 4);
            graphics.generateTexture('dot', TILE_SIZE, TILE_SIZE);
            
            // Power pellet
            graphics.fillStyle(0xffffff, 1);
            graphics.fillCircle(TILE_SIZE/2, TILE_SIZE/2, 8);
            graphics.generateTexture('pellet', TILE_SIZE, TILE_SIZE);
            
            graphics.destroy();
        }

        function create() {
            scoreText = this.add.text(20, 10, 'SCORE: 0', { fontSize: '24px', fill: '#fff' }).setDepth(100);
            
            // Create maze
            for (let y = 0; y < MAP.length; y++) {
                for (let x = 0; x < MAP[y].length; x++) {
                    const tile = MAP[y][x];
                    if (tile === '1') {
                        const wall = this.add.image(x * TILE_SIZE, y * TILE_SIZE, 'wall').setOrigin(0);
                        walls.push(wall);
                        this.physics.add.existing(wall, true); // static
                    } else if (tile === '.') {
                        const dot = this.add.image(x * TILE_SIZE + TILE_SIZE/2, y * TILE_SIZE + TILE_SIZE/2, 'dot');
                        this.physics.add.existing(dot, true);
                        dot.body.setCircle(4);
                        dots.push(dot);
                    }
                }
            }

            // Pac-Man
            pacman = this.add.circle(14 * TILE_SIZE, 23 * TILE_SIZE, 9, 0xffff00);
            this.physics.add.existing(pacman);
            pacman.body.setCollideWorldBounds(true);
            pacman.setDepth(10);

            // Keyboard controls
            cursors = this.input.keyboard.createCursorKeys();

            // Simple ghosts (red, pink, etc.)
            const ghostColors = [0xff0000, 0xff69b4, 0x00ffff, 0xffa500];
            ghosts = [];
            for (let i = 0; i < 4; i++) {
                const ghost = this.add.circle(13 * TILE_SIZE + i*20, 11 * TILE_SIZE, 9, ghostColors[i]);
                this.physics.add.existing(ghost);
                ghosts.push(ghost);
            }

            // Collisions
            this.physics.add.collider(pacman, walls);

            // Dot collection
            dots.forEach(dot => {
                this.physics.add.overlap(pacman, dot, () => {
                    dot.destroy();
                    score += 10;
                    scoreText.setText('SCORE: ' + score);
                });
            });

            // Ghost collision (simple game over)
            ghosts.forEach(ghost => {
                this.physics.add.overlap(pacman, ghost, () => {
                    if (!gameOver) {
                        gameOver = true;
                        this.add.text(200, 280, 'GAME OVER', { fontSize: '48px', fill: '#f00' }).setOrigin(0.5);
                    }
                });
            });
        }

        function update() {
            if (gameOver) return;

            const speed = 150;

            pacman.body.setVelocity(0);

            if (cursors.left.isDown) {
                pacman.body.setVelocityX(-speed);
            } else if (cursors.right.isDown) {
                pacman.body.setVelocityX(speed);
            } else if (cursors.up.isDown) {
                pacman.body.setVelocityY(-speed);
            } else if (cursors.down.isDown) {
                pacman.body.setVelocityY(speed);
            }

            // Simple ghost AI (random movement)
            ghosts.forEach((ghost, index) => {
                if (Phaser.Math.Between(1, 60) === 1) { // change direction occasionally
                    const dir = Phaser.Math.Between(0, 3);
                    const gspeed = 100;
                    switch(dir) {
                        case 0: ghost.body.setVelocity(-gspeed, 0); break;
                        case 1: ghost.body.setVelocity(gspeed, 0); break;
                        case 2: ghost.body.setVelocity(0, -gspeed); break;
                        case 3: ghost.body.setVelocity(0, gspeed); break;
                    }
                }
            });
        }
    </script>
</body>
</html>
